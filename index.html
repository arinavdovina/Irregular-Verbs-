<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irregular Verbs: Naval Battle</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #0066ff;
            --bg: #050b14;
            --glass: rgba(255, 255, 255, 0.1);
            --hit: #ff3e3e;
            --miss: #ffffff44;
            --ship: #00f2ffaa;
            --correct: #2ecc71;
            --wrong: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: radial-gradient(circle at center, #0a192f 0%, #050b14 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .radar-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 150vmax;
            height: 150vmax;
            transform: translate(-50%, -50%);
            background: repeating-radial-gradient(circle, transparent 0, transparent 10%, rgba(0, 242, 255, 0.05) 10.1%, transparent 10.2%);
            z-index: -1;
            pointer-events: none;
        }

        header {
            padding: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        header h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 15px var(--primary);
        }

        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            padding: 20px;
            max-width: 1200px;
            width: 100%;
        }

        .board-wrapper {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .board-title {
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 35px);
            grid-template-rows: repeat(10, 35px);
            gap: 2px;
            background: rgba(0, 242, 255, 0.1);
            border: 2px solid var(--primary);
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(10, 8vw);
                grid-template-rows: repeat(10, 8vw);
            }
        }

        .cell {
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 47, 0.8);
            border: 0.5px solid rgba(0, 242, 255, 0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
        }

        .cell:hover { background: rgba(0, 242, 255, 0.2); }
        .cell.hit { background: rgba(255, 62, 62, 0.3); }
        .cell.hit::after { content: '×'; color: var(--hit); font-size: 1.5rem; font-weight: bold; }
        .cell.miss { background: rgba(255, 255, 255, 0.1); }
        .cell.miss::after { content: '•'; color: var(--miss); font-size: 1.2rem; }
        .cell.ship { background: var(--ship); }

        /* Modal / Question Overlay */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 11, 20, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .question-card {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }

        .options-grid {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--primary);
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        /* Feedback Colors */
        .option-btn.correct { background: var(--correct) !important; border-color: var(--correct); color: #fff; }
        .option-btn.wrong { background: var(--wrong) !important; border-color: var(--wrong); color: #fff; }

        /* Scaffolding Styles */
        .scaffolding {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid var(--wrong);
            text-align: left;
            animation: slideIn 0.3s ease-out;
        }
        
        .scaffolding h3 { color: var(--primary); margin-bottom: 5px; font-size: 1rem; }
        .scaffolding p { font-size: 1.2rem; letter-spacing: 1px; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-continue {
            margin-top: 20px;
            padding: 10px 25px;
            background: var(--primary);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: none; /* Shown only after answer */
            width: 100%;
        }

        .status-panel {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: var(--glass);
            text-align: center;
            min-width: 250px;
        }

        .btn-start {
            padding: 12px 30px;
            font-size: 1.2rem;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-start:hover {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 20px var(--primary);
        }

        #msg { margin-top: 10px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="radar-bg"></div>

    <header>
        <h1>Naval Battle</h1>
        <p>Irregular Verbs: Master the Fleet</p>
    </header>

    <div class="controls">
        <button class="btn-start" onclick="startGame()">Commence Mission</button>
    </div>

    <div class="game-container">
        <div class="board-wrapper">
            <div class="board-title">USER RADAR</div>
            <div class="grid" id="player-grid"></div>
        </div>
        <div class="board-wrapper">
            <div class="board-title">ENEMY TERRITORY</div>
            <div class="grid" id="enemy-grid"></div>
        </div>
    </div>

    <div class="status-panel">
        <div id="turn-info">Status: Ready for command</div>
        <div id="msg">Correct answers enable weapon systems.</div>
    </div>

    <div id="modal-overlay">
        <div class="question-card" id="question-card"></div>
    </div>

    <script>
        // Verbs Database with scaffolding data
        const verbsDB = [
            { v: "be", q: "Past Simple of 'be' (plural)?", a: "were", o: ["was", "were", "been", "is"], forms: "be - was/were - been", translate: "быть" },
            { v: "become", q: "Past Simple of 'become'?", a: "became", o: ["become", "becoming", "became", "becomes"], forms: "become - became - become", translate: "становиться" },
            { v: "begin", q: "Past Simple of 'begin'?", a: "began", o: ["begun", "began", "beginned", "begins"], forms: "begin - began - begun", translate: "начинать" },
            { v: "break", q: "Past Simple of 'break'?", a: "broke", o: ["broken", "breaked", "brake", "broke"], forms: "break - broke - broken", translate: "ломать" },
            { v: "bring", q: "Past Simple of 'bring'?", a: "brought", o: ["brang", "brought", "bringed", "broughten"], forms: "bring - brought - brought", translate: "приносить" },
            { v: "buy", q: "Past Simple of 'buy'?", a: "bought", o: ["bought", "buyed", "boughten", "boughts"], forms: "buy - bought - bought", translate: "покупать" },
            { v: "come", q: "Past Simple of 'come'?", a: "came", o: ["comed", "came", "coming", "comes"], forms: "come - came - come", translate: "приходить" },
            { v: "do", q: "Past Simple of 'do'?", a: "did", o: ["done", "doed", "did", "does"], forms: "do - did - done", translate: "делать" },
            { v: "eat", q: "Past Simple of 'eat'?", a: "ate", o: ["eaten", "eated", "ate", "eats"], forms: "eat - ate - eaten", translate: "есть" },
            { v: "go", q: "Past Simple of 'go'?", a: "went", o: ["gone", "goed", "went", "goes"], forms: "go - went - gone", translate: "идти" }
            // Можно добавить больше глаголов по аналогии
        ];

        let questions = [];
        let playerBoard = [], enemyBoard = [];
        let gameActive = false;
        let pendingShot = null;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createGrid(containerId, boardArr) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let i = 0; i < 100; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                if (containerId === 'enemy-grid') {
                    cell.addEventListener('click', () => handlePlayerShot(i));
                }
                container.appendChild(cell);
                boardArr[i] = { hasShip: false, hit: false };
            }
        }

        function placeShipsRandomly(board, shipSizes) {
            shipSizes.forEach(size => {
                let placed = false;
                while (!placed) {
                    const isHorizontal = Math.random() > 0.5;
                    const row = Math.floor(Math.random() * 10);
                    const col = Math.floor(Math.random() * (10 - (isHorizontal ? size : 0)));
                    const startPos = isHorizontal ? row * 10 + col : col * 10 + row;
                    if (!isHorizontal && row + size > 10) continue;
                    let collision = false;
                    const shipIndices = [];
                    for (let i = 0; i < size; i++) {
                        const idx = isHorizontal ? startPos + i : startPos + (i * 10);
                        if (board[idx].hasShip) { collision = true; break; }
                        shipIndices.push(idx);
                    }
                    if (!collision) {
                        shipIndices.forEach(idx => board[idx].hasShip = true);
                        placed = true;
                    }
                }
            });
        }

        function startGame() {
            questions = shuffle([...verbsDB]);
            playerBoard = Array(100).fill(null).map(() => ({hasShip: false, hit: false}));
            enemyBoard = Array(100).fill(null).map(() => ({hasShip: false, hit: false}));
            createGrid('player-grid', playerBoard);
            createGrid('enemy-grid', enemyBoard);
            const shipSet = [4, 3, 3, 2, 2, 1];
            placeShipsRandomly(playerBoard, shipSet);
            placeShipsRandomly(enemyBoard, shipSet);
            
            // Render player ships
            const pCells = document.querySelectorAll('#player-grid .cell');
            playerBoard.forEach((data, i) => { if(data.hasShip) pCells[i].classList.add('ship'); });

            gameActive = true;
            document.getElementById('turn-info').innerText = "Status: Enemy detected. Select target.";
        }

        function handlePlayerShot(index) {
            if (!gameActive || enemyBoard[index].hit) return;
            pendingShot = index;
            showQuestion();
        }

        function showQuestion() {
            if (questions.length === 0) questions = shuffle([...verbsDB]);
            const question = questions[0];
            const overlay = document.getElementById('modal-overlay');
            const card = document.getElementById('question-card');
            const shuffledOptions = shuffle([...question.o]);
            
            overlay.style.display = 'flex';
            card.innerHTML = `
                <h2>Target Calibration</h2>
                <p style="font-size: 1.3rem; margin-bottom: 20px;">${question.q}</p>
                <div class="options-grid" id="options-container">
                    ${shuffledOptions.map(opt => `
                        <button class="option-btn" onclick="processAnswer(this, '${opt}', '${question.a}')">${opt}</button>
                    `).join('')}
                </div>
                <div id="scaffold-area"></div>
                <button class="btn-continue" id="btn-continue" onclick="closeQuestion()">Continue Mission</button>
            `;
        }

        function processAnswer(btn, selected, correct) {
            const currentQ = questions[0];
            const buttons = document.querySelectorAll('.option-btn');
            const scaffoldArea = document.getElementById('scaffold-area');
            const continueBtn = document.getElementById('btn-continue');
            
            // Disable all buttons
            buttons.forEach(b => b.removeAttribute('onclick'));

            const isCorrect = selected === correct;
            
            // Highlight Correct / Wrong
            buttons.forEach(b => {
                if (b.innerText === correct) b.classList.add('correct');
                if (b === btn && !isCorrect) b.classList.add('wrong');
            });

            if (!isCorrect) {
                scaffoldArea.innerHTML = `
                    <div class="scaffolding">
                        <h3>REMEMBER:</h3>
                        <p><strong>${currentQ.forms}</strong></p>
                        <p style="color: #ccc; font-size: 0.9rem;">Перевод: ${currentQ.translate}</p>
                    </div>
                `;
            }

            // Execute Shot Logic
            const index = pendingShot;
            const cell = document.querySelectorAll('#enemy-grid .cell')[index];
            enemyBoard[index].hit = true;

            if (isCorrect && enemyBoard[index].hasShip) {
                cell.classList.add('hit');
                document.getElementById('msg').innerText = "DIRECT HIT!";
            } else {
                cell.classList.add('miss');
                document.getElementById('msg').innerText = isCorrect ? "Splash. Just water." : "CALIBRATION ERROR!";
            }

            continueBtn.style.display = 'block';
            checkWin();
        }

        function closeQuestion() {
            document.getElementById('modal-overlay').style.display = 'none';
            questions.shift();
            if (gameActive) setTimeout(enemyTurn, 600);
        }

        function enemyTurn() {
            let index;
            do { index = Math.floor(Math.random() * 100); } while (playerBoard[index].hit);
            playerBoard[index].hit = true;
            const cell = document.querySelectorAll('#player-grid .cell')[index];
            if (playerBoard[index].hasShip) {
                cell.classList.add('hit');
                document.getElementById('turn-info').innerText = "Status: WE ARE UNDER ATTACK!";
            } else {
                cell.classList.add('miss');
                document.getElementById('turn-info').innerText = "Status: Your turn.";
            }
            checkWin();
        }

        function checkWin() {
            const playerLost = playerBoard.filter(c => c.hasShip && !c.hit).length === 0;
            const enemyLost = enemyBoard.filter(c => c.hasShip && !c.hit).length === 0;
            if (playerLost || enemyLost) {
                gameActive = false;
                const result = enemyLost ? "MISSION SUCCESSFUL!" : "MISSION FAILED.";
                document.getElementById('turn-info').innerText = result;
            }
        }
    </script>
</body>
</html>
